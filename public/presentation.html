<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中間発表資料 — 永田右京</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); font-family: system-ui, sans-serif; }
    #gate { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 1.5rem;
      padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; color: #fff; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
    .sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 2rem; }
    input { width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 1rem; text-align: center; letter-spacing: 0.1em;
      outline: none; margin-bottom: 0.75rem; }
    input::placeholder { color: rgba(255,255,255,0.35); }
    input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
    button { width: 100%; padding: 0.75rem; border-radius: 0.75rem; border: none;
      background: #fff; color: #0f172a; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.88; }
    .err { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2rem; }
    #slide-wrap { position: fixed; inset: 0; display: none; }
    #slide-wrap iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="gate">
    <div class="icon">🎓</div>
    <h1>博士論文 中間発表資料</h1>
    <p class="sub">Ukyo Nagata · 2026年6月</p>
    <input type="password" id="pw" placeholder="パスワードを入力" autofocus>
    <button onclick="check()">入室する</button>
    <p class="err" id="err"></p>
  </div>
  <div id="slide-wrap">
    <iframe id="frame" src="" title="中間発表資料" allow="autoplay"></iframe>
  </div>
  <script>
    if (sessionStorage.getItem('pres_ok') === '1') unlock();
    document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    function check() {
      if (document.getElementById('pw').value === 'metanature2026') {
        sessionStorage.setItem('pres_ok', '1');
        unlock();
      } else {
        document.getElementById('err').textContent = 'パスワードが違います';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
    function unlock() {
      document.getElementById('gate').style.display = 'none';
      document.body.style.background = 'none';
      const wrap = document.getElementById('slide-wrap');
      document.getElementById('frame').src = '/_slides/index.html';
      wrap.style.display = 'block';
    }
  </script>
</body>
</html>
